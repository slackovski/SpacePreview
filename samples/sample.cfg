[DEFAULT]
log_level = INFO
timezone = Asia/Shanghai

[database]
engine   = postgresql
host     = localhost
port     = 5432
name     = myapp
user     = app_user
pool_min = 2
pool_max = 10

[cache]
backend  = redis
host     = localhost
port     = 6379
timeout  = 300

[email]
backend    = smtp
host       = smtp.example.com
port       = 587
use_tls    = true
from_email = noreply@example.com
