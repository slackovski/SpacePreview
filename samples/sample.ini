[app]
name = SpacePreview
version = 1.0.0
debug = false
log_level = info

[server]
host = 0.0.0.0
port = 8080
read_timeout = 30s
write_timeout = 30s

[database]
host = localhost
port = 3306
name = myapp_db
user = app_user
max_connections = 20
idle_connections = 5

[redis]
host = localhost
port = 6379
db = 0
pool_size = 10

[jwt]
access_expire  = 15m
refresh_expire = 168h
