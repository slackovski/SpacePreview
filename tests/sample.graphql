type User {
  id: ID!
  name: String!
  email: String!
  role: Role!
  posts(limit: Int = 10, offset: Int = 0): [Post!]!
  createdAt: DateTime!
}

type Post {
  id: ID!
  title: String!
  content: String!
  published: Boolean!
  author: User!
  createdAt: DateTime!
}

enum Role {
  ADMIN
  EDITOR
  VIEWER
}

scalar DateTime

type Query {
  user(id: ID!): User
  users(role: Role, limit: Int = 20): [User!]!
  post(id: ID!): Post
}

type Mutation {
  createUser(name: String!, email: String!, role: Role = VIEWER): User!
  updateUser(id: ID!, name: String, email: String): User!
  deleteUser(id: ID!): Boolean!
  publishPost(id: ID!): Post!
}
