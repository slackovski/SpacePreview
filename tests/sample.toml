[package]
name = "spacepreview"
version = "1.0.0"
edition = "2021"
authors = ["SpacePreview Contributors"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }

[dev-dependencies]
tokio-test = "0.4"

[profile.release]
opt-level = 3
lto = true
strip = true

[workspace]
members = ["crates/*"]
